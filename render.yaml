services:
  - type: web
    name: neurotechcare
    runtime: node
    buildCommand: pnpm install && pnpm build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neurotechcare-db
          property: connectionString
      - key: API_PORT
        value: 3001

databases:
  - name: neurotechcare-db
    databaseName: neurotechcare
    user: neurotechcare
    plan: free
